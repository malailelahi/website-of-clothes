<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothes Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Our Clothes Store</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#men">Men</a></li>
            <li><a href="#women">Women</a></li>
            <li><a href="#kids">Kids</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
    <main>
        <section id="men">
            <h2>Men's Clothing</h2>
            <div class="product">
                <img src="images/mens t shirt.png" alt="Men's T-Shirt">
                <h3>Men's T-Shirt</h3>
                <p>$19.99</p>
            </div>
            <div class="product">
                <img src="images/pant (mens).png" alt="Men's Jeans">
                <h3>Men's Jeans</h3>
                <p>$39.99</p>
            </div>
        </section>
        <section id="women">
            <h2>Women's Clothing</h2>
            <div class="product">
                <img src="images/dress.png" alt="Women's Dress">
                <h3>Women's Dress</h3>
                <p>$49.99</p>
            </div>
            <div class="product">
                <img src="images/womens blouse.png" alt="Women's Blouse">
                <h3>Women's Blouse</h3>
                <p>$29.99</p>
            </div>
        </section>
        <section id="kids">
            <h2>Kids' Clothing</h2>
            <div class="product">
                <img src="images/kids t shirt.png" alt="Kids' T-Shirt">
                <h3>Kids' T-Shirt</h3>
                <p>$14.99</p>
            </div>
            <div class="product">
                <img src="images/pant (kids).png" alt="Kids' Pants">
                <h3>Kids' Pants</h3>
                <p>$24.99</p>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 Clothes Store. All rights reserved.</p>
    </footer>
</body>
</html>
